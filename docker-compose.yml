version: '3.8'

services:
  backend:
    build: ./backend
    container_name: mana_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=manadesi123
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: mana_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
