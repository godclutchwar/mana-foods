[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["functions/backend/data.json"]

[dev]
  command = "cd frontend && npm run dev"
  port = 3000
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api/uploads/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
